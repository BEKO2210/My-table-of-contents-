<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <title>{{ page.title | default: site.title }}</title>

    <!-- Preconnect für bessere Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- SEO Tags -->
    {% seo %}
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress"></div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark/Light Mode">
        <i class="theme-toggle-icon fas fa-moon"></i>
    </button>

    <!-- Gradient Orbs Background -->
    <div class="gradient-orbs">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Particle Background -->
    <div class="particle-background">
        <canvas id="particles-canvas"></canvas>
    </div>

    <!-- Ultra-Thin Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-left">
                <a href="{{ '/' | relative_url }}" class="home-btn" aria-label="Home">
                    <i class="fas fa-home"></i>
                </a>
                <div class="nav-brand">
                    <h1 class="logo">{{ site.author }}</h1>
                    <p class="tagline">Portfolio</p>
                </div>
            </div>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Slide-out Menu -->
    <div class="nav-menu" id="nav-menu">
        <div class="nav-links">
            <a href="#projekte" class="nav-link">
                <i class="fas fa-folder-open"></i>
                <span>Projekte</span>
            </a>
            <a href="https://x.com/XxBeko88xX" target="_blank" class="nav-link">
                <i class="fab fa-x-twitter"></i>
                <span>X (Twitter)</span>
            </a>
            <a href="https://huggingface.co/Beko2210" target="_blank" class="nav-link">
                <i class="fas fa-face-smile"></i>
                <span>HuggingFace</span>
            </a>
            <a href="https://www.instagram.com/_b_to_the_kiss_" target="_blank" class="nav-link">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.facebook.com/share/1DGo4F1oaF/" target="_blank" class="nav-link">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>
            <a href="#kontakt" class="nav-link">
                <i class="fas fa-envelope"></i>
                <span>Kontakt</span>
            </a>
            <a href="{{ '/impressum.html' | relative_url }}" class="nav-link">
                <i class="fas fa-info-circle"></i>
                <span>Impressum</span>
            </a>
            <a href="{{ '/datenschutz.html' | relative_url }}" class="nav-link">
                <i class="fas fa-shield-alt"></i>
                <span>Datenschutz</span>
            </a>
        </div>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- Main Content -->
    <main>
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-inner">
            <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</p>
            <nav class="footer-social" aria-label="Social">
                <a href="https://github.com/BEKO2210" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://x.com/XxBeko88xX" target="_blank" rel="noopener" aria-label="X" title="X"><i class="fab fa-x-twitter"></i></a>
                <a href="https://huggingface.co/Beko2210" target="_blank" rel="noopener" aria-label="HuggingFace" title="HuggingFace"><i class="fas fa-face-smile"></i></a>
                <a href="https://www.instagram.com/_b_to_the_kiss_" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/share/1DGo4F1oaF/" target="_blank" rel="noopener" aria-label="Facebook" title="Facebook"><i class="fab fa-facebook"></i></a>
            </nav>
            <nav class="footer-legal" aria-label="Rechtliches">
                <a href="{{ '/impressum.html' | relative_url }}">Impressum</a>
                <span class="footer-dot" aria-hidden="true">·</span>
                <a href="{{ '/datenschutz.html' | relative_url }}">Datenschutz</a>
            </nav>
        </div>
    </footer>

    <!-- Custom JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
