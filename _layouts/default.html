<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <title>{{ page.title | default: site.title }}</title>

    <!-- Preconnect für bessere Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>

    <!-- Google Fonts (nur genutzte Weights: 400/500/600/700) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <!-- Font Awesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Theme-init (verhindert Flash of Wrong Theme, läuft VOR Body-Rendering) -->
    <script>
    (function() {
        try {
            var t = localStorage.getItem('theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch(e) {}
    })();
    </script>

    <!-- PWA -->
    <link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/icons/favicon-32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/icons/favicon-16.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="B.A Portfolio">

    <!-- SEO Tags -->
    {% seo %}
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress"></div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle magnetic" id="theme-toggle" aria-label="Toggle Dark/Light Mode" data-magnetic="0.4" data-magnetic-max="10">
        <i class="theme-toggle-icon fas fa-moon"></i>
    </button>

    <!-- Gradient Orbs Background -->
    <div class="gradient-orbs">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Particle Background -->
    <div class="particle-background">
        <canvas id="particles-canvas"></canvas>
    </div>

    <!-- Ultra-Thin Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-left">
                <a href="{{ '/' | relative_url }}" class="home-btn magnetic" aria-label="Home" data-magnetic="0.4" data-magnetic-max="10">
                    <i class="fas fa-home"></i>
                </a>
                <div class="nav-brand">
                    <h1 class="logo">{{ site.author }}</h1>
                    <p class="tagline">Portfolio</p>
                </div>
            </div>
            <button class="menu-toggle magnetic" id="menu-toggle" aria-label="Toggle Menu" data-magnetic="0.35" data-magnetic-max="8">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Slide-out Menu -->
    <div class="nav-menu" id="nav-menu">
        <div class="nav-links">
            <a href="#projekte" class="nav-link">
                <i class="fas fa-folder-open"></i>
                <span>Projekte</span>
            </a>
            <a href="https://x.com/XxBeko88xX" target="_blank" class="nav-link">
                <i class="fab fa-x-twitter"></i>
                <span>X (Twitter)</span>
            </a>
            <a href="https://huggingface.co/Beko2210" target="_blank" class="nav-link">
                <i class="fas fa-face-smile"></i>
                <span>HuggingFace</span>
            </a>
            <a href="https://www.instagram.com/_b_to_the_kiss_" target="_blank" class="nav-link">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.facebook.com/share/1DGo4F1oaF/" target="_blank" class="nav-link">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>
            <a href="#kontakt" class="nav-link">
                <i class="fas fa-envelope"></i>
                <span>Kontakt</span>
            </a>
            <a href="{{ '/impressum.html' | relative_url }}" class="nav-link">
                <i class="fas fa-info-circle"></i>
                <span>Impressum</span>
            </a>
            <a href="{{ '/datenschutz.html' | relative_url }}" class="nav-link">
                <i class="fas fa-shield-alt"></i>
                <span>Datenschutz</span>
            </a>
        </div>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- Main Content -->
    <main>
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-inner">
            <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</p>
            <nav class="footer-social" aria-label="Social">
                <a href="https://github.com/BEKO2210" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://x.com/XxBeko88xX" target="_blank" rel="noopener" aria-label="X" title="X"><i class="fab fa-x-twitter"></i></a>
                <a href="https://huggingface.co/Beko2210" target="_blank" rel="noopener" aria-label="HuggingFace" title="HuggingFace"><i class="fas fa-face-smile"></i></a>
                <a href="https://www.instagram.com/_b_to_the_kiss_" target="_blank" rel="noopener" aria-label="Instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/share/1DGo4F1oaF/" target="_blank" rel="noopener" aria-label="Facebook" title="Facebook"><i class="fab fa-facebook"></i></a>
            </nav>
            <nav class="footer-legal" aria-label="Rechtliches">
                <a href="{{ '/impressum.html' | relative_url }}">Impressum</a>
                <span class="footer-dot" aria-hidden="true">·</span>
                <a href="{{ '/datenschutz.html' | relative_url }}">Datenschutz</a>
            </nav>
        </div>
    </footer>

    <!-- Premium Runtime Libraries (gzip-ready CDNs) -->
    <!-- Lenis: buttery smooth-scroll — Awwwards Standard -->
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js" defer></script>
    <!-- anime.js: timeline-based micro-animations + SVG morph -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" defer></script>
    <!-- Splitting.js: per-character / per-word split für Text-Reveals -->
    <script src="https://unpkg.com/splitting@1.1.0/dist/splitting.min.js" defer></script>

    <!-- Custom JavaScript (nach Libs, nutzt sie wenn vorhanden) -->
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/premium.js' | relative_url }}" defer></script>

    <!-- Service Worker Registration -->
    <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('{{ '/sw.js' | relative_url }}', { scope: '{{ site.baseurl }}/' })
          .then(function (reg) {
            setInterval(function () { reg.update(); }, 60 * 60 * 1000);
            reg.addEventListener('updatefound', function () {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', function () {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  nw.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          });
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    })();
    </script>
</body>
</html>
