<?xml version="1.0" encoding="UTF-8"?>
<!--
  Prompt Tree — animated mark (premium)
  ─────────────────────────────────────
  Same geometry as mark.svg (three-node sigil, φ-proportions, −8° rotation).
  Tells the brand story in two beats:

    Beat 1 (0.0 – 2.5 s) — reveal.  Each node scale-bounces into place
      as the spline reaches it; soft glow filter gives the whole thing
      a premium feel; refinement side-branch and its open tip appear
      a half-beat behind the main trunk.

    Beat 2 (2.5 s onwards, looping) — life.  A bright spark travels
      from seed to canonical head every 3 s (the story: a prompt
      flowing from input to shipping version).  The head scale-pulses
      when the spark arrives.  The crown ring breathes.  The
      refinement branch has a slow stroke-dash march toward its tip
      (exploration never stops).

  Pure SMIL — no JS.  Renders in GitHub READMEs, on Pages, in any
  static host.  Renderers that strip animation land on the final
  drawn state (fill="freeze" on the reveal animations).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Prompt Tree">
  <title>Prompt Tree — branch, prove, ship.</title>

  <defs>
    <!-- Brand-gradient ink: deep teal → cyan → light cyan (ocean palette). -->
    <linearGradient id="pt-ink" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#155e75"/>
      <stop offset="0.55" stop-color="#0891b2"/>
      <stop offset="1"    stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Gradient for the traveling spark — brighter, higher-contrast -->
    <radialGradient id="pt-spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#cffafe" stop-opacity="0.95"/>
      <stop offset="1"   stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft halo filter applied to the spline for premium feel -->
    <filter id="pt-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.45" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger halo used only on the canonical head — so the head
         visually "weighs" more than the other nodes -->
    <filter id="pt-glow-head" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="rotate(-8 12 12)" fill="none" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- ════ Main spline: seed → fork → head ════
         Drawn in Beat 1. Stays fully drawn in Beat 2.  Has the soft
         glow filter so the line reads as luminous, not just coloured. -->
    <path d="M 6 20 C 6 16, 12 15.2, 12 11.2 C 12 8.0, 15.8 6.8, 17 5.2"
          stroke="url(#pt-ink)" filter="url(#pt-glow)"
          stroke-dasharray="20" stroke-dashoffset="20">
      <animate attributeName="stroke-dashoffset"
               from="20" to="0"
               begin="0.15s" dur="1.6s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>

    <!-- ════ Traveling spark ════
         Second invisible-until-2.5s path drawn on top of the main spline.
         A very short bright segment chases along it with animated
         stroke-dashoffset.  "1.5 200" means a 1.5-unit bright glyph and
         a 200-unit gap — so only one bright dot is ever visible.
         Offset range: 3 (pre-path, off the seed end) → -20 (past head,
         off the top).  Cycle holds at the ends to create a clean
         "launch → travel → rest" rhythm. -->
    <path d="M 6 20 C 6 16, 12 15.2, 12 11.2 C 12 8.0, 15.8 6.8, 17 5.2"
          stroke="#ffffff" stroke-width="2.2"
          stroke-dasharray="1.5 200" stroke-dashoffset="3"
          opacity="0" filter="url(#pt-glow)">
      <animate attributeName="opacity"
               from="0" to="0.95"
               begin="2.4s" dur="0.2s" fill="freeze"/>
      <animate attributeName="stroke-dashoffset"
               values="3;    3;    -20;  -20"
               keyTimes="0;   0.08; 0.72; 1"
               dur="3s" begin="2.5s" repeatCount="indefinite"
               calcMode="spline"
               keySplines="0 0 1 1 ; 0.45 0 0.25 1 ; 0 0 1 1"/>
    </path>

    <!-- ════ Refinement side-branch ════
         Dashed, leaves the fork, ends in an open node (intentionally
         NOT canonical).  Draws in Beat 1 (opacity fade) and then has a
         slow "march" of its stroke-dasharray offset during Beat 2 — the
         exploration pattern never stops. -->
    <path id="pt-refine"
          d="M 12 11.2 C 15.4 12.4, 18.2 13.6, 19.6 15.2"
          stroke="#14b8a6" stroke-width="1.5"
          stroke-dasharray="2 2.2" stroke-dashoffset="0"
          opacity="0">
      <animate attributeName="opacity"
               from="0" to="0.85"
               begin="1.1s" dur="0.6s" fill="freeze"/>
      <!-- marching dashes in beat 2 -->
      <animate attributeName="stroke-dashoffset"
               from="0" to="-4.2"
               begin="2.5s" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- ════ Seed — open bottom-left circle ════
         Scale-bounces in at t=0 (the start of the story). -->
    <g transform="translate(6 20)">
      <circle r="1.7" stroke="url(#pt-ink)" fill="#ffffff" filter="url(#pt-glow)"
              opacity="0">
        <animate attributeName="opacity"
                 from="0" to="1"
                 begin="0s" dur="0.35s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale"
                 values="0.2; 1.25; 1"
                 keyTimes="0; 0.6; 1"
                 begin="0s" dur="0.5s" fill="freeze"
                 calcMode="spline"
                 keySplines="0.4 0 0.2 1 ; 0.4 0 0.6 1"/>
      </circle>
    </g>

    <!-- ════ Fork — solid middle dot ════
         Scale-bounces in when the main spline reaches it (~t=0.9s). -->
    <g transform="translate(12 11.2)">
      <circle r="1.35" fill="url(#pt-ink)" filter="url(#pt-glow)"
              opacity="0">
        <animate attributeName="opacity"
                 from="0" to="1"
                 begin="0.9s" dur="0.3s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale"
                 values="0.2; 1.3; 1"
                 keyTimes="0; 0.6; 1"
                 begin="0.9s" dur="0.45s" fill="freeze"
                 calcMode="spline"
                 keySplines="0.4 0 0.2 1 ; 0.4 0 0.6 1"/>
      </circle>
    </g>

    <!-- ════ Refinement tip — open end of the dashed branch ════ -->
    <g transform="translate(19.6 15.2)">
      <circle r="1.3" stroke="#14b8a6" stroke-width="1.3" fill="#ffffff"
              opacity="0">
        <animate attributeName="opacity"
                 from="0" to="1"
                 begin="1.6s" dur="0.3s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale"
                 values="0.2; 1.25; 1"
                 keyTimes="0; 0.6; 1"
                 begin="1.6s" dur="0.45s" fill="freeze"
                 calcMode="spline"
                 keySplines="0.4 0 0.2 1 ; 0.4 0 0.6 1"/>
      </circle>
    </g>

    <!-- ════ Canonical head — filled disk ════
         Scale-bounces when the main spline completes, then pulses
         gently each time a spark "arrives" (every 3s). -->
    <g transform="translate(17 5.2)">
      <circle r="2.1" fill="url(#pt-ink)" filter="url(#pt-glow-head)"
              opacity="0">
        <animate attributeName="opacity"
                 from="0" to="1"
                 begin="1.7s" dur="0.3s" fill="freeze"/>
        <!-- Reveal bounce -->
        <animateTransform attributeName="transform" type="scale"
                 values="0.2; 1.35; 1"
                 keyTimes="0; 0.55; 1"
                 begin="1.7s" dur="0.55s" fill="freeze"
                 calcMode="spline"
                 keySplines="0.4 0 0.2 1 ; 0.4 0 0.6 1"
                 additive="replace"/>
        <!-- Perpetual arrival pulse — aligned with the spark reaching it
             (cycle 3s, peak at 68% into the cycle = when spark lands) -->
        <animateTransform attributeName="transform" type="scale"
                 values="1; 1; 1.18; 1"
                 keyTimes="0; 0.6; 0.72; 1"
                 begin="2.5s" dur="3s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0 0 1 1 ; 0.3 0 0.4 1 ; 0.4 0 0.2 1"
                 additive="sum"/>
      </circle>

      <!-- Crown ring — expands on reveal, then breathes forever -->
      <circle r="3.2" stroke="url(#pt-ink)" stroke-width="1.1" opacity="0">
        <!-- Reveal: fade + radius grow -->
        <animate attributeName="opacity"
                 from="0" to="0.55"
                 begin="1.9s" dur="0.5s" fill="freeze"/>
        <animate attributeName="r"
                 from="2.2" to="3.2"
                 begin="1.9s" dur="0.6s" fill="freeze"
                 calcMode="spline" keySplines="0.4 0 0.2 1"/>
        <!-- Breath: opacity + radius together, 2.6s cycle -->
        <animate attributeName="opacity"
                 values="0.55; 0.3; 0.55"
                 keyTimes="0; 0.5; 1"
                 begin="2.5s" dur="2.6s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.4 0 0.6 1 ; 0.4 0 0.6 1"/>
        <animate attributeName="r"
                 values="3.2; 3.55; 3.2"
                 keyTimes="0; 0.5; 1"
                 begin="2.5s" dur="2.6s" repeatCount="indefinite"
                 calcMode="spline"
                 keySplines="0.4 0 0.6 1 ; 0.4 0 0.6 1"/>
      </circle>
    </g>

  </g>
</svg>
