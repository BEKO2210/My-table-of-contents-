<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="IQ-Test · CHC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a7a"/>
      <stop offset="1" stop-color="#0b1332"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6dcac"/>
      <stop offset="0.55" stop-color="#d9b072"/>
      <stop offset="1" stop-color="#a47840"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.28" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9bd" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffe9bd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Maskable safe zone: alles Wesentliche liegt innerhalb r=205 um (256,256). -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#gloss)"/>

  <!-- Innerer dünner Edelrahmen -->
  <rect x="24" y="24" width="464" height="464" rx="100"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Zusätzlicher feinster Konturring außen um die Konstellation -->
  <circle cx="256" cy="256" r="168" fill="none"
          stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>

  <!-- Sanftes Zentralleuchten hinter dem g-Faktor -->
  <circle cx="256" cy="256" r="70" fill="url(#centerGlow)"/>

  <!-- Outer hexagon (r = 144, point-top), Eckkoordinaten: -->
  <!-- (256,112) (380.7,184) (380.7,328) (256,400) (131.3,328) (131.3,184) -->
  <polygon points="256,112 380.7,184 380.7,328 256,400 131.3,328 131.3,184"
           fill="none" stroke="#ffffff" stroke-opacity="0.62"
           stroke-width="7" stroke-linejoin="round"/>

  <!-- Radiale Speichen (Verbindungen g ↔ Broad Abilities) -->
  <g stroke="#ffffff" stroke-opacity="0.32" stroke-width="5" stroke-linecap="round">
    <line x1="256" y1="256" x2="256"   y2="112"/>
    <line x1="256" y1="256" x2="380.7" y2="184"/>
    <line x1="256" y1="256" x2="380.7" y2="328"/>
    <line x1="256" y1="256" x2="256"   y2="400"/>
    <line x1="256" y1="256" x2="131.3" y2="328"/>
    <line x1="256" y1="256" x2="131.3" y2="184"/>
  </g>

  <!-- 6 Broad-Ability-Knoten -->
  <g fill="#ffffff">
    <circle cx="256"   cy="112" r="15"/>
    <circle cx="380.7" cy="184" r="15"/>
    <circle cx="380.7" cy="328" r="15"/>
    <circle cx="256"   cy="400" r="15"/>
    <circle cx="131.3" cy="328" r="15"/>
    <circle cx="131.3" cy="184" r="15"/>
  </g>

  <!-- Zentraler g-Faktor in Gold, mit feinem Highlight-Ring -->
  <circle cx="256" cy="256" r="28" fill="url(#gold)"/>
  <circle cx="256" cy="256" r="28" fill="none" stroke="#f8e6bf" stroke-opacity="0.65" stroke-width="2.5"/>
  <circle cx="248" cy="248" r="7" fill="#ffffff" fill-opacity="0.55"/>
</svg>
