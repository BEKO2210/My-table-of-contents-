# Site Settings
title: "Belkis Aslani - Portfolio"
description: "High-Tech Portfolio & Project Showcase"
author: "Belkis Aslani"
url: "https://BEKO2210.github.io"
baseurl: "/My-table-of-contents-"

# Build settings
markdown: kramdown
theme: null

# Collections
collections:
  projects:
    output: false

# Exclude files
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
